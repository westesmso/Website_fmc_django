{% extends 'fmc/base.html' %}
{% block title %}{{ site.brand_name }} | Cotacao de Eventos{% endblock %}
{% block content %}
    <h1>Cotacao de Eventos</h1>

    <section class="card" style="padding:18px; max-width:760px; margin:0 auto;">
        <form method="post">
            {% csrf_token %}
            <p>
                {{ form.nome.errors }}
                <label for="{{ form.nome.id_for_label }}">{{ form.nome.label }}</label>
                <input id="{{ form.nome.id_for_label }}" name="nome" type="text" value="{{ form.nome.value|default:'' }}" required>
            </p>
            <p>
                {{ form.email.errors }}
                <label for="{{ form.email.id_for_label }}">{{ form.email.label }}</label>
                <input id="{{ form.email.id_for_label }}" name="email" type="email" value="{{ form.email.value|default:'' }}" required>
            </p>
            <p>
                {{ form.mensagem.errors }}
                <label for="{{ form.mensagem.id_for_label }}">{{ form.mensagem.label }}</label>
                <textarea id="{{ form.mensagem.id_for_label }}" name="mensagem" rows="5" required>{{ form.mensagem.value|default:'' }}</textarea>
            </p>
            <button type="submit">Enviar</button>
        </form>
    </section>
{% endblock %}
