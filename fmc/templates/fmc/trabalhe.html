{% extends 'fmc/base.html' %}
{% block title %}{{ site.brand_name }} | Trabalhe Conosco{% endblock %}
{% block content %}
    <h1>Trabalhe com a FMC</h1>

    <section class="card" style="padding:18px; max-width:760px; margin:0 auto;">
        <form method="post">
            {% csrf_token %}
            <p>
                {{ form.nome.errors }}
                <label for="{{ form.nome.id_for_label }}">{{ form.nome.label }}</label>
                <input id="{{ form.nome.id_for_label }}" name="nome" type="text" value="{{ form.nome.value|default:'' }}" required>
            </p>
            <p>
                {{ form.telefone.errors }}
                <label for="{{ form.telefone.id_for_label }}">{{ form.telefone.label }}</label>
                <input id="{{ form.telefone.id_for_label }}" name="telefone" type="text" value="{{ form.telefone.value|default:'' }}" required>
            </p>
            <p>
                {{ form.descricao.errors }}
                <label for="{{ form.descricao.id_for_label }}">{{ form.descricao.label }}</label>
                <textarea id="{{ form.descricao.id_for_label }}" name="descricao" rows="4" required>{{ form.descricao.value|default:'' }}</textarea>
            </p>
            <button type="submit">Enviar</button>
        </form>
    </section>
{% endblock %}
